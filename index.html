<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부 사이트 모음 · 한국 공공서비스 길잡이</title>
<link rel="icon" type="image/png" href="img/logo.png">
<style>
  :root{
    --navy:#1a2740;
    --ink:#1e2a44;--muted:#5b6b86;--muted2:#8a99b3;
    --card:#ffffff;--soft:#f3f6fc;--line:#e5eaf3;
    --blue:#4f83f0;--violet:#7b6cf0;
    --grad:linear-gradient(120deg,#4f83f0,#7b6cf0);
    --grad-soft:linear-gradient(120deg,rgba(79,131,240,.1),rgba(123,108,240,.1));
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:radial-gradient(1000px 500px at 50% -80px,#2c3f63,var(--navy));
    color:var(--ink);line-height:1.6;min-height:100vh;
    display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}

  /* 공지 배너 */
  .notice{background:var(--grad);color:#fff;font-size:0.86rem;
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:9px 42px 9px 16px;position:relative;text-align:center;flex:0 0 auto;}
  .notice .badge{background:rgba(255,255,255,.24);padding:2px 9px;border-radius:999px;font-weight:700;font-size:0.76rem;}
  .notice b{font-weight:700;}
  .notice .x{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.22);
    border:none;color:#fff;cursor:pointer;font-size:0.95rem;line-height:1;}
  .notice .x:hover{background:rgba(255,255,255,.38);}
  .notice.hide{display:none;}

  .wrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:22px 20px;}
  .card{background:var(--card);border-radius:24px;width:100%;max-width:500px;
    box-shadow:0 26px 60px rgba(10,18,38,.45);overflow:hidden;}
  .card-body{padding:34px 34px 26px;text-align:center;}

  .logo-badge{width:78px;height:78px;border-radius:22px;margin:0 auto 18px;overflow:hidden;
    box-shadow:0 12px 30px rgba(79,131,240,.4);}
  .logo-badge img{width:100%;height:100%;object-fit:cover;display:block;}
  h1{margin:0 0 11px;font-size:1.62rem;font-weight:800;letter-spacing:-0.02em;line-height:1.25;}
  h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .lead{margin:0 auto;max-width:400px;color:var(--muted);font-size:0.96rem;}

  .tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0 24px;}
  .tags span{background:var(--soft);color:var(--blue);
    padding:7px 15px;border-radius:999px;font-size:0.85rem;font-weight:600;}

  .cta{display:inline-flex;align-items:center;gap:8px;background:var(--grad);color:#fff;
    padding:14px 40px;border-radius:15px;font-size:1.05rem;font-weight:700;
    box-shadow:0 12px 28px rgba(79,131,240,.4);transition:.16s;}
  .cta:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(79,131,240,.5);}
  .cta-note{margin-top:12px;font-size:0.82rem;color:var(--muted2);
    display:flex;align-items:center;gap:6px;justify-content:center;}

  .disc{margin-top:22px;background:#fff5f1;border:1px solid #f6d3c6;border-radius:12px;
    padding:12px 16px;color:#a6482f;font-size:0.82rem;line-height:1.5;}
  .disc b{color:#8f3a24;}

  /* 화면 맨 아래 흰색 고정 배너 (내용 비움) */
  .bottom-banner{
    flex:0 0 auto;background:#ffffff;
    min-height:56px;display:flex;align-items:center;justify-content:center;
    padding:16px 20px;font-size:0.88rem;color:var(--muted2);text-align:center;
    box-shadow:0 -4px 20px rgba(10,18,38,.25);
  }

  @media(max-width:560px){
    h1{font-size:1.4rem;}
    .card-body{padding:28px 24px 22px;}
  }
</style>
</head>
<body>

<div class="notice" id="notice">
  <span class="badge">안내</span>
  <span>이곳은 정부 공식 사이트가 <b>아닙니다</b>. 비공식 링크 모음입니다.</span>
  <button class="x" id="noticeX" aria-label="닫기">×</button>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-body">
      <div class="logo-badge"><img src="img/logo.png" alt="정부 사이트 모음 로고"></div>
      <h1>흩어진 정부 사이트를 <//br><//span class="g">한곳에서</span></h1>
      <p class="lead">자주 쓰는 한국 공공서비스 공식 사이트 72곳을 분야별로 정리했습니다.</p>

      <div class="tags">
        <span>🔍 빠른 검색</span>
        <span>🏛️ 공식 72곳</span>
        <span>✉️ 건의사항</span>
      </div>

      <a class="cta" href="bot-test/">시작하기 →</a>
      <div class="cta-note">🛡️ 보안 확인 후 이동합니다</div>

      <div class="disc">
        이 사이트는 정부 공식 사이트가 <b>아닙니다</b>. 개인정보는 이 사이트가 아닌 공식 사이트에서만 입력하세요.
      </div>
    </div>
  </div>
</div>

<!-- 화면 맨 아래 흰색 고정 배너 (내용 비움) -->
<div class="bottom-banner" id="bottomBanner">© 2026 한글과 코딩 · Hangul & Coding | 사이트의 저작권은 그 사이트를 제작한 기관에 있습니다.</div>

<script>
  document.getElementById('noticeX').onclick=()=>document.getElementById('notice').classList.add('hide');
</script>
</body>
</html>
