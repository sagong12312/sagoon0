<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 건의사항 관리</title>
<link rel="icon" type="image/png" href="../img/logo.png">
<style>
  :root{
    --navy:#1a2740;--ink:#1e2a44;--muted:#5b6b86;--muted2:#8a99b3;
    --card:#fff;--soft:#f3f6fc;--line:#e5eaf3;
    --blue:#4f83f0;--violet:#7b6cf0;
    --grad:linear-gradient(120deg,#4f83f0,#7b6cf0);
    --grad-soft:linear-gradient(120deg,rgba(79,131,240,.1),rgba(123,108,240,.1));
    --err:#d6502f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:radial-gradient(1000px 500px at 50% -80px,#2c3f63,var(--navy));
    color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
  header{flex:0 0 auto;background:rgba(20,32,54,.5);border-bottom:1px solid rgba(255,255,255,.08);}
  .top-inner{max-width:860px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.02rem;color:#fff;}
  .brand .badge{width:36px;height:36px;border-radius:10px;overflow:hidden;box-shadow:0 8px 20px rgba(79,131,240,.4);}
  .brand .badge img{width:100%;height:100%;object-fit:cover;display:block;}
  .userbar{display:flex;align-items:center;gap:12px;}
  .who{font-size:0.85rem;color:#c3cfe4;}
  .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);
    padding:7px 14px;font-size:0.84rem;border-radius:9px;font-family:inherit;cursor:pointer;transition:.15s;}
  .btn-ghost:hover{background:rgba(255,255,255,.2);}
  .wrap{flex:1 1 auto;max-width:860px;width:100%;margin:0 auto;padding:34px 24px;}

  .login{max-width:380px;margin:30px auto;background:var(--card);border-radius:22px;
    padding:34px 30px;box-shadow:0 26px 60px rgba(10,18,38,.4);}
  .login .ic{width:56px;height:56px;border-radius:15px;background:var(--grad-soft);
    display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 16px;}
  .login h2{margin:0 0 4px;font-size:1.3rem;text-align:center;font-weight:800;}
  .login p{margin:0 0 20px;font-size:0.86rem;color:var(--muted);text-align:center;}
  label{display:block;font-size:0.82rem;font-weight:600;margin:12px 0 6px;color:var(--muted);}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;
    font-family:inherit;font-size:0.95rem;color:var(--ink);background:#fff;}
  input::placeholder{color:#aab6cc;}
  input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(79,131,240,.14);}
  .btn{background:var(--grad);color:#fff;border:none;padding:13px 20px;border-radius:12px;
    font-size:0.96rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.16s;}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.05);}
  .btn:disabled{opacity:.5;cursor:default;transform:none;}
  .btn-full{width:100%;margin-top:20px;box-shadow:0 12px 28px rgba(79,131,240,.35);}
  .msg{margin-top:12px;font-size:0.88rem;min-height:20px;text-align:center;}
  .msg.err{color:var(--err);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
  .count{font-size:0.95rem;color:#e8eefb;font-weight:600;}
  .refresh{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);
    padding:8px 16px;font-size:0.85rem;border-radius:9px;font-family:inherit;cursor:pointer;}
  .refresh:hover{background:rgba(255,255,255,.2);}
  .item{background:var(--card);border-radius:15px;padding:18px 20px;margin-bottom:13px;box-shadow:0 8px 24px rgba(10,18,38,.2);}
  .item-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:0.82rem;color:var(--muted2);margin-bottom:10px;align-items:center;}
  .tag{background:var(--grad-soft);color:var(--blue);font-weight:700;padding:4px 12px;border-radius:999px;font-size:0.78rem;}
  .item-body{white-space:pre-wrap;word-break:break-word;font-size:0.97rem;color:var(--ink);}
  .item-meta{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:0.82rem;color:var(--muted);}
  .item-meta a{color:var(--blue);}
  .state{text-align:center;padding:50px 20px;color:#c3cfe4;}
  .hidden{display:none;}
  .bottom-banner{flex:0 0 auto;background:#fff;min-height:56px;display:flex;align-items:center;
    justify-content:center;padding:16px 20px;font-size:0.88rem;color:var(--muted2);text-align:center;
    box-shadow:0 -4px 20px rgba(10,18,38,.25);}
</style>
</head>
<body>
<header>
  <div class="top-inner">
    <a class="brand" href="../main/"><span class="badge"><img src="../img/logo.png" alt="로고"></span>건의사항 관리</a>
    <div id="userbar" class="userbar hidden"><span class="who" id="who"></span><button class="btn-ghost" id="logout">로그아웃</button></div>
  </div>
</header>
<div class="wrap">
  <section class="login" id="loginView">
    <div class="ic">🔒</div>
    <h2>관리자 로그인</h2>
    <p>등록된 관리자 계정으로만 접근할 수 있습니다.</p>
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" placeholder="admin@example.com">
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="비밀번호">
    <button class="btn btn-full" id="loginBtn">로그인</button>
    <div class="msg" id="loginMsg"></div>
  </section>
  <section id="listView" class="hidden">
    <div class="toolbar"><span class="count" id="count"></span><button class="refresh" id="refresh">새로고침</button></div>
    <div id="list"></div>
    <div class="state hidden" id="emptyState">접수된 건의사항이 없습니다.</div>
    <div class="state hidden" id="loadingState">불러오는 중…</div>
  </section>
</div>
<div class="bottom-banner" id="bottomBanner"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB6_BJlmQx8pl419tiv5etaYYQ7EQpdXTA",authDomain:"korea-gov-collect.firebaseapp.com",
  projectId:"korea-gov-collect",storageBucket:"korea-gov-collect.firebasestorage.app",
  messagingSenderId:"262187977125",appId:"1:262187977125:web:72033379e8aa310280004c",measurementId:"G-V7GXJ3KSBW"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const loginView=document.getElementById('loginView'),listView=document.getElementById('listView'),
  userbar=document.getElementById('userbar'),who=document.getElementById('who'),
  loginMsg=document.getElementById('loginMsg'),loginBtn=document.getElementById('loginBtn');
onAuthStateChanged(auth,user=>{
  if(user){loginView.classList.add('hidden');listView.classList.remove('hidden');userbar.classList.remove('hidden');who.textContent=user.email;loadSuggestions();}
  else{loginView.classList.remove('hidden');listView.classList.add('hidden');userbar.classList.add('hidden');}
});
loginBtn.addEventListener('click',async()=>{
  const email=document.getElementById('email').value.trim(),pw=document.getElementById('pw').value;
  if(!email||!pw){loginMsg.textContent='이메일과 비밀번호를 입력하세요.';loginMsg.className='msg err';return;}
  loginBtn.disabled=true;loginMsg.textContent='로그인 중…';loginMsg.className='msg';
  try{await signInWithEmailAndPassword(auth,email,pw);loginMsg.textContent='';}
  catch(err){loginMsg.textContent='로그인 실패: 이메일 또는 비밀번호를 확인하세요.';loginMsg.className='msg err';}
  finally{loginBtn.disabled=false;}
});
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')loginBtn.click();});
document.getElementById('logout').addEventListener('click',()=>signOut(auth));
const listEl=document.getElementById('list'),countEl=document.getElementById('count'),
  emptyState=document.getElementById('emptyState'),loadingState=document.getElementById('loadingState');
document.getElementById('refresh').addEventListener('click',loadSuggestions);
async function loadSuggestions(){
  listEl.innerHTML='';emptyState.classList.add('hidden');loadingState.classList.remove('hidden');countEl.textContent='';
  try{
    const q=query(collection(db,'suggestions'),orderBy('createdAt','desc'));const snap=await getDocs(q);
    loadingState.classList.add('hidden');
    if(snap.empty){emptyState.classList.remove('hidden');return;}
    countEl.textContent=`총 ${snap.size}건`;
    snap.forEach(doc=>{const d=doc.data();
      const when=d.createdAt?.toDate?d.createdAt.toDate().toLocaleString('ko-KR'):'시간 미상';
      const card=document.createElement('div');card.className='item';
      const email=d.email?`<a href="mailto:${esc(d.email)}">${esc(d.email)}</a>`:'없음';
      card.innerHTML=`<div class="item-top"><span class="tag">${esc(d.type||'기타')}</span><span>${esc(when)}</span></div>
        <div class="item-body">${esc(d.body||'')}</div>
        <div class="item-meta">작성자: ${esc(d.name||'익명')} · 이메일: ${email}</div>`;
      listEl.appendChild(card);});
  }catch(err){loadingState.classList.add('hidden');countEl.textContent='';
    listEl.innerHTML=`<div class="state" style="color:#ffb59a">불러오기 실패: ${esc(err.message)}<br><br>Firestore 규칙에서 관리자 읽기 권한이 설정됐는지 확인하세요.</div>`;}
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
