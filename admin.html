<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 건의사항 관리</title>
<style>
  :root{
    --ink:#13233b;--ink-soft:#4a5a72;--paper:#f5f3ec;--card:#fff;
    --line:#dcd8cb;--seal:#b6432f;--gov:#1d4e89;--gov-soft:#e3ecf6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.6;}
  header{background:var(--ink);color:#fff;border-bottom:4px solid var(--seal);}
  .head-inner{max-width:900px;margin:0 auto;padding:22px 24px;display:flex;
    justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .head-inner h1{margin:0;font-size:1.3rem;font-weight:800;}
  .who{font-size:0.85rem;color:#b9c4d6;}
  main{max-width:900px;margin:0 auto;padding:30px 24px 60px;}

  /* Login */
  .login{max-width:360px;margin:60px auto;background:var(--card);
    border:1.5px solid var(--line);border-radius:14px;padding:28px 24px;}
  .login h2{margin:0 0 4px;font-size:1.2rem;}
  .login p{margin:0 0 18px;font-size:0.86rem;color:var(--ink-soft);}
  label{display:block;font-size:0.82rem;font-weight:600;margin:10px 0 5px;color:var(--ink-soft);}
  input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;
    font-family:inherit;font-size:0.95rem;}
  input:focus{outline:3px solid var(--gov-soft);border-color:var(--gov);}
  .btn{background:var(--gov);color:#fff;border:none;padding:12px 20px;border-radius:9px;
    font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s;}
  .btn:hover{background:#163c6b;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn-full{width:100%;margin-top:18px;}
  .btn-ghost{background:#fff;color:var(--ink-soft);border:1.5px solid var(--line);
    padding:8px 16px;font-size:0.85rem;}
  .btn-ghost:hover{background:#f2f0e8;}
  .msg{margin-top:12px;font-size:0.88rem;min-height:20px;}
  .msg.err{color:var(--seal);}

  /* List */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
  .count{font-size:0.9rem;color:var(--ink-soft);}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;}
  .card-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
    font-size:0.82rem;color:var(--ink-soft);margin-bottom:8px;}
  .tag{background:var(--gov-soft);color:var(--gov);font-weight:700;
    padding:2px 10px;border-radius:999px;font-size:0.78rem;}
  .card-body{white-space:pre-wrap;word-break:break-word;font-size:0.96rem;}
  .card-meta{margin-top:10px;font-size:0.82rem;color:var(--ink-soft);}
  .card-meta a{color:var(--gov);}
  .state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  .hidden{display:none;}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1>건의사항 관리</h1>
    <div id="userbar" class="hidden">
      <span class="who" id="who"></span>
      <button class="btn btn-ghost" id="logout">로그아웃</button>
    </div>
  </div>
</header>

<main>
  <!-- 로그인 화면 -->
  <section class="login" id="loginView">
    <h2>관리자 로그인</h2>
    <p>등록된 관리자 계정으로만 접근할 수 있습니다.</p>
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" placeholder="admin@example.com">
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="비밀번호">
    <button class="btn btn-full" id="loginBtn">로그인</button>
    <div class="msg" id="loginMsg"></div>
  </section>

  <!-- 목록 화면 -->
  <section id="listView" class="hidden">
    <div class="toolbar">
      <span class="count" id="count"></span>
      <button class="btn btn-ghost" id="refresh">새로고침</button>
    </div>
    <div id="list"></div>
    <div class="state hidden" id="emptyState">접수된 건의사항이 없습니다.</div>
    <div class="state hidden" id="loadingState">불러오는 중…</div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6_BJlmQx8pl419tiv5etaYYQ7EQpdXTA",
  authDomain: "korea-gov-collect.firebaseapp.com",
  projectId: "korea-gov-collect",
  storageBucket: "korea-gov-collect.firebasestorage.app",
  messagingSenderId: "262187977125",
  appId: "1:262187977125:web:72033379e8aa310280004c",
  measurementId: "G-V7GXJ3KSBW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginView=document.getElementById('loginView');
const listView=document.getElementById('listView');
const userbar=document.getElementById('userbar');
const who=document.getElementById('who');
const loginMsg=document.getElementById('loginMsg');
const loginBtn=document.getElementById('loginBtn');

// 로그인 상태 감지
onAuthStateChanged(auth, user=>{
  if(user){
    loginView.classList.add('hidden');
    listView.classList.remove('hidden');
    userbar.classList.remove('hidden');
    who.textContent=user.email;
    loadSuggestions();
  }else{
    loginView.classList.remove('hidden');
    listView.classList.add('hidden');
    userbar.classList.add('hidden');
  }
});

// 로그인
loginBtn.addEventListener('click', async()=>{
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  if(!email||!pw){ loginMsg.textContent='이메일과 비밀번호를 입력하세요.'; loginMsg.className='msg err'; return; }
  loginBtn.disabled=true; loginMsg.textContent='로그인 중…'; loginMsg.className='msg';
  try{
    await signInWithEmailAndPassword(auth,email,pw);
    loginMsg.textContent='';
  }catch(err){
    loginMsg.textContent='로그인 실패: 이메일 또는 비밀번호를 확인하세요.';
    loginMsg.className='msg err';
  }finally{ loginBtn.disabled=false; }
});
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')loginBtn.click();});

// 로그아웃
document.getElementById('logout').addEventListener('click',()=>signOut(auth));

// 목록 불러오기
const listEl=document.getElementById('list');
const countEl=document.getElementById('count');
const emptyState=document.getElementById('emptyState');
const loadingState=document.getElementById('loadingState');
document.getElementById('refresh').addEventListener('click',loadSuggestions);

async function loadSuggestions(){
  listEl.innerHTML=''; emptyState.classList.add('hidden');
  loadingState.classList.remove('hidden'); countEl.textContent='';
  try{
    const q=query(collection(db,'suggestions'),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    loadingState.classList.add('hidden');
    if(snap.empty){ emptyState.classList.remove('hidden'); return; }
    countEl.textContent=`총 ${snap.size}건`;
    snap.forEach(doc=>{
      const d=doc.data();
      const when=d.createdAt?.toDate ? d.createdAt.toDate().toLocaleString('ko-KR') : '시간 미상';
      const card=document.createElement('div');
      card.className='card';
      const email=d.email ? `<a href="mailto:${esc(d.email)}">${esc(d.email)}</a>` : '없음';
      card.innerHTML=`
        <div class="card-top">
          <span class="tag">${esc(d.type||'기타')}</span>
          <span>${esc(when)}</span>
        </div>
        <div class="card-body">${esc(d.body||'')}</div>
        <div class="card-meta">작성자: ${esc(d.name||'익명')} · 이메일: ${email}</div>`;
      listEl.appendChild(card);
    });
  }catch(err){
    loadingState.classList.add('hidden');
    countEl.textContent='';
    listEl.innerHTML=`<div class="state" style="color:var(--seal)">불러오기 실패: ${esc(err.message)}<br><br>Firestore 규칙에서 관리자 읽기 권한이 설정됐는지 확인하세요.</div>`;
  }
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
