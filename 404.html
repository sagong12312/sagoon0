<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo_red.png" type="image/png">
<title>404 - 페이지를 찾을 수 없습니다</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a2235,#2d3d5c);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
.box{text-align:center;max-width:480px}
.code{font-size:110px;font-weight:800;line-height:1;background:linear-gradient(135deg,#5b8def,#34c98a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
h1{font-size:24px;margin-bottom:14px}
.sub{font-size:15px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 24px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;text-decoration:none;font-size:14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:rgba(255,255,255,.16)}
.btn.primary{background:#5b8def;border-color:#5b8def}.btn.primary:hover{background:#4a7ce0}
.icon{font-size:60px;margin-bottom:18px}
.search{display:flex;gap:8px;margin:0 auto 28px;max-width:320px}
.search input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-family:inherit;outline:none}
.search input::placeholder{color:rgba(255,255,255,.4)}
.float{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="box">
  <div class="icon float">!</div>
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <div class="sub">요청하신 페이지가 존재하지 않거나<br>이동되었을 수 있습니다.</div>
  <div class="btns">
    <a href="/" class="btn primary">홈으로</a>
    <button class="btn" onclick="history.back()">← 이전 페이지</button>
  </div>
</div>
</body>
</html>
